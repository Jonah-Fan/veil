name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    name: Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint + tsc --noEmit)
        run: npm run lint

      - name: Build (wxt build)
        run: npm run build

      - name: Build Edge target (wxt build --browser edge)
        run: npx wxt build --browser edge
